services:
  postgres:
    image: postgres:16-alpine
    container_name: esg-postgres
    environment:
      POSTGRES_DB: esg_inventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esg_inventory"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: esg-backend
    working_dir: /app
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/esg_inventory?schema=public"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && node prisma/bootstrapSeed.js && node server.js"

  frontend:
    build:
      context: ./frontend
    container_name: esg-frontend
    working_dir: /app
    environment:
      # Фронт ходит к API из браузера, поэтому host = localhost
      VITE_API_BASE_URL: "http://localhost:3000/api"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: >
      sh -c "npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres_data:

